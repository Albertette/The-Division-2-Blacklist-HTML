<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>IP黑名单管理</title>

<link rel="shortcut" href="/static/TCTD2_Icon_Phoenix_Secondary_Orange.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">


<style>



/* 全局：只要有中文就用Smiley Sans，纯英文才走Orbitron */
body {
    background: radial-gradient(circle at top,#1b2235,#090a0f);
    font-family: "Smiley Sans", 'Segoe UI', sans-serif;
    min-height:100vh;
    padding:40px;
    color:white;
    overflow-anchor: none;
}

.log-level,
.log-ip,
.log-msg,
.log-status_code,
.log-user,
.log-location {
    font-family: sans-serif !important;
}

/* 纯英文/数字标签：IP、时间、按钮 → 科技字体 */
.label[english],
.value[english],
.unban-btn[english],
.page[english] {
    font-family: 'Orbitron', "Smiley Sans", sans-serif;
}



/* 标题：纯英文 → 科技感 */
.title {
    font-family:'Orbitron', "Smiley Sans", sans-serif;
    color:#ff7b00;
    font-size:22px;
}

/* 输入框、下拉框：中英混合 → Smiley Sans */
select, input {
    font-family: "Smiley Sans", sans-serif;
    padding:12px;
    border-radius:8px;
    border:none;
    background:#111;
    color:white;
}

.user-panel{
    position:absolute;
    top:20px;
    right:30px;
    color:rgba(255,255,255,0.8);
    font-size:13px;
    z-index:10;
}
.user-panel a{
    color:#ff7b00;
    text-decoration:none;
    margin-left:12px;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}
.search-bar{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}
.card{
    position:relative;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,123,0,0.3);
    border-radius:12px;
    padding:20px;
    transition:0.25s;
    animation:fadeUp .4s ease;
}
.card:hover{
    transform:translateY(-4px);
    border-color:#ff7b00;
    box-shadow:0 12px 25px rgba(255,123,0,.35);
}
@keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}
.label{
    color:#ff7b00;
    font-size:13px;
}
.value{
    margin-bottom:8px;
    word-break:break-all;
}
.unban-btn{
    margin-top:10px;
    padding:8px 16px;
    border-radius:8px;
    border:none;
    background:linear-gradient(135deg,#ff7b00,#ffb347);
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
    width:100%;
    font-family: "Smiley Sans", sans-serif !important;
}
.unban-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(255,123,0,.4);
    background:linear-gradient(135deg,#ff9500,#ffcc80);
}
.pagination{
    margin-top:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
}
.page{
    min-width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    cursor:pointer;
    transition:.25s;
    font-size:14px;
}
.page:hover{
    background:rgba(255,123,0,0.2);
    border-color:#ff7b00;
    transform:translateY(-2px);
}
.page.active{
    background:linear-gradient(135deg,#ff7b00,#ffb347);
    color:black;
    font-weight:600;
    box-shadow:0 4px 12px rgba(255,123,0,.4);
}
.page.arrow{
    font-weight:bold;
    font-size:16px;
}
.beian{
    margin-top:60px;
    padding:30px 0 20px 0;
    text-align:center;
    font-size:12px;
    letter-spacing:0.5px;
    opacity:0.7;
}
.beian a{
    color:rgba(255,255,255,0.45);
    text-decoration:none;
    transition:0.25s;
}
.beian a:hover{
    color:#ff7b00;
    text-shadow:0 0 6px rgba(255,123,0,.6);
}
.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translate(-50%, -50px);
    background:rgba(0,0,0,0.8);
    color:white;
    padding:12px 24px;
    border-radius:8px;
    border-left:4px solid #ff7b00;
    opacity:0;
    transition:0.3s;
    z-index:9999;
}
.toast.show{
    opacity:1;
    transform:translate(-50%, 0);
}

.unban-btn.disabled {
    background: #666;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}
.unban-btn.disabled:hover {
    background: #666;
}

/* ====================== 实时日志（绝对固定位置 · 永不移动） ====================== */
.log-panel {
    margin-top: 20px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,123,0,0.3);
    border-radius: 12px;
    padding: 0;
    height: 600px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.log-title {
    font-family: 'Orbitron', sans-serif;
    color: #ff7b00;
    font-size: 16px;
    padding: 16px 20px 10px 20px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(255,123,0,0.2);
    position: sticky;
    top: 0;
    z-index: 99;
}
.log-list {
    flex: 1;
    padding: 0 20px;
    font-size: 13px;
    line-height: 13.5px;
    color: rgba(255,255,255,0.85);
    overflow-y: auto;
    overflow-x: auto;
    white-space: nowrap !important;
    scrollbar-width: none;
}
.log-list::-webkit-scrollbar { display: none !important; }

.log-item {
    padding: 6px 0;
    border-bottom: 1px dashed rgba(255,255,255,0.05);
    white-space: nowrap !important;
    display: block;
}

/* 🔥 绝对固定宽度 · 位置永远不动 */
.log-level {
    display: inline-block;
    width: 30px !important;
    text-align: center;
    padding: 2px 0;
    border-radius: 4px;
    font-size: 12px;
    margin-right: 12px;
    color: #fff;
}
.log-time {
    display: inline-block;
    width: 165px !important;
    font-family: 'Orbitron', sans-serif;
    color: #ff7b00;
    margin-right: 12px;
}
.log-ip {
    display: inline-block;
    color: #ffcc80;
    font-weight: 500;
    margin-right: 12px;
}
.log-msg {
    display: inline-block;
}

.log-status_code {
    display: inline-block;
    width: 55px !important;
    text-align: center;
    margin-right: 12px;
    color: #ffb347;
}
.log-user {
    display: inline-block;
    width: 122px !important;
    margin-right: 12px;
    color: #ffcc80;
}
.log-location {
    display: inline-block;
    width: 150px !important;
    margin-right: 12px;
    color: #a0d2eb;
}

.log-high { background: #c92a2a; }
.log-low { background: #2f9e44; }

</style>
</head>
<body>

<div class="user-panel">
当前用户：{{ session['account'] }}
<span style="color: {{ '#b22222' if is_super_admin else '#ff7b00'}}">
    {{ '（超级管理员）' if is_super_admin else '（管理员）'}}
</span>
<a href="/logout">退出登录</a>
<a href="/" style="color:#ff7b00">返回首页</a>
<a href="/admin/ip_manage" style="color:#ff7b00">刷新列表</a>
</div>

<div class="header">
    <div class="title">IP BLACKLIST MANAGE</div>
</div>

<div style="display:flex;gap:10px;margin-bottom:20px;">
    <div class="page english active" id="tabBlacklist" onclick="switchTab('blacklist')" style="min-width: 140px;">黑名单管理</div>
    <div class="page english" id="tabAttackStats" onclick="switchTab('attackStats')" style="min-width: 140px;">安全事件统计</div>
    <div class="page english" id="tabGlobalMap" onclick="switchTab('globalMap')" style="min-width: 140px;">实时日志</div>
</div>

<div class="search-bar" id="blackSearchBar">
    <input id="searchIp" placeholder="输入IP搜索">
    <select id="banReason">
        <option value="">全部原因</option>
        <option value="attack_scan">恶意扫描</option>
        <option value="attack_scan_repeat">重复扫描</option>
        <option value="login_bruteforce">登录暴力破解</option>
        <option value="direct_ip_flood">短期直连次数过多</option>
        <option value="malicious">其他恶意行为</option>
        <option value="security_events_exceed_30">永久封禁</option>
    </select>
    <select id="regionFilter">
        <option value="all">全部地区</option>
        <option value="domestic">国内（含港澳台）</option>
        <option value="foreign">国外</option>
    </select>
</div>

<div class="search-bar" id="statsSearchBar" style="display:none;">
    <input id="searchStatsIp" placeholder="输入IP搜索">
    <select id="riskLevel">
        <option value="">全部风险等级</option>
        <option value="低风险">低风险</option>
        <option value="中风险">中风险</option>
        <option value="高风险">高风险</option>
    </select>
    <select id="statsRegionFilter">
        <option value="all">全部地区</option>
        <option value="domestic">国内（含港澳台）</option>
        <option value="foreign">国外</option>
    </select>
</div>

<div id="grid" class="grid"></div>
<div id="pages" class="pagination"></div>
<div id="toast" class="toast"></div>

<div id="globalMapPanel" style="display:none;">
    <div class="log-panel">
        <div class="log-title">
            <span>REAL-TIME SECURITY LOG</span>
            <span style="font-size:12px;opacity:0.7">实时刷新</span>
        </div>
        <div id="logList" class="log-list"></div>
    </div>
</div>

<script>
let blacklist = []
let filtered = []
let page = 1
const size = 12

const isSuperAdmin = {{ 'true' if is_super_admin else 'false' }};
const isRootAdmin = {{ 'true' if is_root_admin else 'false' }};

let attackStats = []
let filteredStats = []
let statsPage = 1
const statsSize = 12

let currentTab = 'blacklist'
let ipLocationCache = {};

async function preloadAllIpLocations() {
    try {
        const response = await fetch("/api/all_ip_locations");
        if (response.ok) {
            ipLocationCache = await response.json();
        }
    } catch (e) {}
}

function getIpLocationSync(ip) {
    const loc = ipLocationCache[ip] || { status: "fail" };
    if (loc?.status !== "ok") {
        return { location: "未知位置", isp: "未知运营商", country: "" };
    }
    const parts = [];
    if (loc.country) parts.push(loc.country);
    if (loc.province) parts.push(loc.province);
    if (loc.city) parts.push(loc.city);
    let location = parts.join(' ') || "未知位置";
    let isp = loc.isp || "未知运营商";
    const showTypes = ["云服务器", "CDN", "VPS", "机房"];
    if (loc.type && showTypes.includes(loc.type)) {
        isp += ` 【${loc.type}】`;
    }
    return { location, isp, country: loc.country };
}

function switchTab(tab) {
    currentTab = tab
    page = 1
    statsPage = 1

    document.getElementById("tabBlacklist").classList.toggle("active", tab === 'blacklist')
    document.getElementById("tabAttackStats").classList.toggle("active", tab === 'attackStats')
    document.getElementById("tabGlobalMap").classList.toggle("active", tab === 'globalMap')

    document.getElementById("blackSearchBar").style.display = tab === 'blacklist' ? 'flex' : 'none'
    document.getElementById("statsSearchBar").style.display = tab === 'attackStats' ? 'flex' : 'none'

    document.getElementById("grid").style.display = tab === 'globalMap' ? 'none' : 'grid'
    document.getElementById("pages").style.display = tab === 'globalMap' ? 'none' : 'flex'
    document.getElementById("globalMapPanel").style.display = tab === 'globalMap' ? 'block' : 'none'

    render()
}

// ======================
// 优先使用首页预加载缓存，0 卡顿
// ======================
async function loadRealTimeLog() {
    if (currentTab !== 'globalMap') return;

    const logContainer = document.getElementById('logList');

    // 第一次：用缓存
    if (window.adminPreload?.logCache && logContainer.innerHTML === '') {
        renderLogList(window.adminPreload.logCache);
        return;
    }

    try {
        const res = await fetch("/api/real_time_log");
        const logs = await res.json();
        renderLogList(logs);
    } catch (e) {}
}

// 日志渲染
function renderLogList(logs) {
    const logContainer = document.getElementById('logList');
    const html = [];
    logs.forEach(log => {
        const levelCls = log.level === 'high' ? 'log-high' : 'log-low';
        const ip = log.ip || '';
        let ipWidth = '95px';
        if (ip.includes(':') && ip.split(':').length > 2) {
            ipWidth = '287px';
        }
        html.push(`
        <div class="log-item">
            <span class="log-level ${levelCls}">${log.level_text}</span>
            <span class="log-time">${log.time}</span>
            <span class="log-status_code">响应：${log.status_code}</span>
            <span class="log-user">用户：${log.user}</span>
            <span class="log-location">位置：${log.location ? log.location.split(' ')[0] : '未知'}</span>
            <span class="log-ip" style="width: ${ipWidth} !important;">${log.ip}</span>
            <span class="log-msg">${log.msg}</span>
        </div>
        `);
    });
    logContainer.innerHTML = html.join('');
}

// ======================
// 🔥 修复：地区筛选 + 搜索
// ======================
function search() {
    if (currentTab !== 'blacklist') return;
    const ipKeyword = document.getElementById("searchIp").value.trim().toLowerCase();
    const reason = document.getElementById("banReason").value;
    const region = document.getElementById("regionFilter").value;

    filtered = blacklist.filter(item => {
        if (ipKeyword && !item.ip.toLowerCase().includes(ipKeyword)) return false;
        if (reason && item.reason !== reason) return false;

        const info = getIpLocationSync(item.ip);
        const c = (info.country || "").trim();

        if (region === "domestic") {
            return c === "中国" || c === "台湾" || c === "香港" || c === "澳门";
        }
        if (region === "foreign") {
            return c && c !== "中国" && c !== "台湾" && c !== "香港" && c !== "澳门";
        }
        return true;
    });
    page = 1;
    render();
}

function searchStats() {
    const ipKeyword = document.getElementById("searchStatsIp").value.trim().toLowerCase();
    const risk = document.getElementById("riskLevel").value;
    const region = document.getElementById("statsRegionFilter").value;

    filteredStats = attackStats.filter(item => {
        if (ipKeyword && !item.ip.toLowerCase().includes(ipKeyword)) return false;
        if (risk && item.risk_level !== risk) return false;

        const info = getIpLocationSync(item.ip);
        const c = (info.country || "").trim();

        if (region === "domestic") {
            return c === "中国" || c === "台湾" || c === "香港" || c === "澳门";
        }
        if (region === "foreign") {
            return c && c !== "中国" && c !== "台湾" && c !== "香港" && c !== "澳门";
        }
        return true;
    });
    statsPage = 1;
    render();
}

document.getElementById("searchIp").oninput = search;
document.getElementById("banReason").onchange = search;
document.getElementById("regionFilter").onchange = search;

document.getElementById("searchStatsIp").oninput = searchStats;
document.getElementById("riskLevel").onchange = searchStats;
document.getElementById("statsRegionFilter").onchange = searchStats;

function render() {
    if (currentTab === 'blacklist') {
        const grid = document.getElementById("grid");
        const start = (page - 1) * size;
        const list = filtered.slice(start, start + size);

        if (list.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.5)">暂无封禁IP</div>`;
            renderPage();
            return;
        }

        let cardHtml = "";
        list.forEach(item => {
            const { location, isp } = getIpLocationSync(item.ip);
            const reasonText = {
                "attack_scan": "恶意扫描",
                "attack_scan_repeat": "重复恶意扫描",
                "login_bruteforce": "登录暴力破解",
                "direct_ip_flood":"短期直连次数过多",
                "malicious": "其他恶意行为",
                "security_events_exceed_30": "安全事件超过30次"
            }[item.reason] || item.reason;

            let unbanButton = isSuperAdmin
                ? `<button class="unban-btn" onclick="unban('${item.ip}')">手动解封</button>`
                : `<button class="unban-btn disabled" disabled>无解封权限（仅超级管理员）</button>`;

            cardHtml += `
            <div class="card">
                <div class="label">IP地址</div>
                <div class="value">${item.ip}</div>
                <div class="label">封禁原因</div>
                <div class="value">${reasonText}</div>
                <div class="label">过期时间</div>
                <div class="value">${item.expire}</div>
                <div class="label">地理位置</div>
                <div class="value">${location}</div>
                <div class="label">运营商</div>
                <div class="value">${isp}</div>
                ${unbanButton}
            </div>`;
        });

        grid.innerHTML = cardHtml;
        renderPage();
    }
    else if (currentTab === 'attackStats') {
        const grid = document.getElementById("grid");
        const start = (statsPage - 1) * statsSize;
        const list = filteredStats.slice(start, start + statsSize);

        if (list.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.5)">暂无安全事件记录</div>`;
            renderStatsPage();
            return;
        }

        let cardHtml = "";
        list.forEach(item => {
            const { location, isp } = getIpLocationSync(item.ip);
            let riskColor = "#ff7b00";
            if (item.risk_level === "低风险") riskColor = "#4CAF50";
            else if (item.risk_level === "中风险") riskColor = "#FFC107";
            else if (item.risk_level === "高风险") riskColor = "#B22222";

            cardHtml += `
            <div class="card">
                <div class="label">IP地址</div>
                <div class="value english">${item.ip}</div>
                <div class="label">安全事件次数</div>
                <div class="value english">${item.event_count}</div>
                <div class="label">风险等级</div>
                <div class="value" style="color:${riskColor};font-weight:600;">${item.risk_level}</div>
                <div class="label">地理位置</div>
                <div class="value">${location}</div>
                <div class="label">运营商</div>
                <div class="value">${isp}</div>
            </div>`;
        });

        grid.innerHTML = cardHtml;
        renderStatsPage();
    }
    else if (currentTab === 'globalMap') {
        loadRealTimeLog();
    }
}

function renderPage() {
    const total = Math.ceil(filtered.length / size)
    const box = document.getElementById("pages")
    box.innerHTML = ""
    if (total <= 1) return
    const maxShow = 5
    let start = Math.max(1, page - Math.floor(maxShow/2))
    let end = start + maxShow - 1
    if (end > total) { end = total; start = Math.max(1, end-maxShow+1) }
    if (page>1) box.innerHTML += `<div class="page arrow" onclick="go(${page-1})">‹</div>`
    for(let i=start;i<=end;i++) box.innerHTML += `<div class="page ${i===page?'active':''}" onclick="go(${i})">${i}</div>`
    if(page<total) box.innerHTML += `<div class="page arrow" onclick="go(${page+1})">›</div>`
}

function renderStatsPage() {
    const total = Math.ceil(filteredStats.length / statsSize)
    const box = document.getElementById("pages")
    box.innerHTML = ""
    if (total <= 1) return
    const maxShow = 5
    let start = Math.max(1, statsPage - Math.floor(maxShow/2))
    let end = start + maxShow - 1
    if (end > total) { end = total; start = Math.max(1, end-maxShow+1) }
    if (statsPage>1) box.innerHTML += `<div class="page arrow" onclick="goStats(${statsPage-1})">‹</div>`
    for(let i=start;i<=end;i++) box.innerHTML += `<div class="page ${i===statsPage?'active':''}" onclick="goStats(${i})">${i}</div>`
    if(statsPage<total) box.innerHTML += `<div class="page arrow" onclick="goStats(${statsPage+1})">›</div>`
}

function go(i) { page = i; render() }
function goStats(i) { statsPage = i; render() }

function unban(ip) {
    if(!confirm(`UNBAN IP: ${ip} ?`)) return
    fetch("/api/unban_ip", {
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:`ip=${encodeURIComponent(ip)}`
    }).then(r=>r.json()).then(res=>{
        showToast(res.msg)
        if(res.status==="ok"){
            blacklist = blacklist.filter(x=>x.ip!==ip)
            filtered = filtered.filter(x=>x.ip!==ip)
            render()
        }
    })
}

function showToast(msg) {
    const t = document.getElementById("toast")
    t.textContent = msg
    t.classList.add("show")
    setTimeout(()=>t.classList.remove("show"), 2000)
}

// 优先使用首页预加载数据，没有再请求接口
async function initData() {
    // 预加载IP地理位置
    await preloadAllIpLocations();

    // 有首页缓存 → 直接用，0 请求
    if (window.adminPreload) {
        if (window.adminPreload.blacklistCache.length) {
            blacklist = window.adminPreload.blacklistCache;
            filtered = [...blacklist];
        }
        if (window.adminPreload.attackStatsCache.length) {
            attackStats = window.adminPreload.attackStatsCache;
            filteredStats = [...attackStats];
        }
        render();
        return;
    }

    // 无缓存 → 正常接口拉取
    try {
        const [stats, black] = await Promise.all([
            fetch("/api/attack_stats").then(r => r.json()),
            fetch("/api/ip_blacklist").then(r => r.json())
        ]);
        attackStats = stats;
        filteredStats = [...stats];
        blacklist = black;
        filtered = [...black];
    } catch (e) {}
    render();
}

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>黑名单查询</title>

<link rel="shortcut icon" href="/static/TCTD2_Icon_Phoenix_Secondary_Orange.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">


<style>



/* 全局字体规则：中文/混合用Smiley Sans，纯英文/数字用科技字体 */
body{
background: radial-gradient(circle at top,#1b2735,#090a0f);
font-family: "Smiley Sans", 'Segoe UI', sans-serif; /* 优先Smiley Sans */
min-height:100vh;
padding:40px;
color:white;
}

.user-panel{
position:absolute;
top:20px;
right:30px;
color:rgba(255,255,255,0.8);
font-size:13px;
z-index:10;
font-family: "Smiley Sans", sans-serif; /* 中文用户信息用Smiley Sans */
}

.user-panel a{
color:#ff7b00;
text-decoration:none;
margin-left:12px;
font-family: "Smiley Sans", sans-serif;
}

/* 顶部 */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

/* 标题：纯英文用科技字体，混合中文用Smiley Sans */
.title{
font-family:'Orbitron', "Smiley Sans", sans-serif;
color:#ff7b00;
font-size:22px;
}

/* 搜索区 */
.search-bar{
display:flex;
gap:15px;
margin-bottom:25px;
}

/* 输入框/下拉框：中文/混合用Smiley Sans */
select,input{
padding:12px;
border-radius:8px;
border:none;
background:#111;
color:white;
font-family: "Smiley Sans", sans-serif; /* 搜索框用Smiley Sans */
}

/* 卡片核心样式修改 - 关键部分 */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
position:relative;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,123,0,0.3);
border-radius:12px;
padding:20px;
transition:0.25s;
animation:fadeUp .4s ease;
/* 核心：卡片高度调整为300px */
height: 300px;
/* 核心：溢出隐藏，无滚动条 */
overflow: hidden;
/* 核心：为内容容器和遮罩定位做准备 */
display: block;
}

/* 卡片内容容器 - 用于整体滚动 */
.card-content {
position: absolute;
top: 20px;
left: 20px;
right: 20px;
/* 核心：保留底部20px留白，内容高度 = 卡片高度 - 上下内边距 - 底部留白 */
height: calc(100% - 40px - 20px);
/* 核心：开启硬件加速，保证动画流畅 */
transform: translateZ(0);
/* 核心：复位动画效果 */
transition: transform 0.5s ease-out;
/* 关键修正：内容层级低于遮罩，确保被遮挡 */
z-index: 0;
}

/* 底部遮罩 - 关键修正：层级高于内容，颜色与卡片完全一致 */
.card::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 60px; /* 底部留白+渐变 */
  background: linear-gradient(
    to bottom,
    rgba(27,39,53,0),       /* 透明到顶部内容 */
    rgba(27,39,53,0.85) 100% /* 和卡片背景近似 */
  );
  z-index: 2;
  pointer-events: none;
  border-radius: 0 0 12px 12px;
}

.card:hover{
transform:translateY(-4px);
border-color:#ff7b00;
box-shadow:0 12px 25px rgba(255,123,0,.35);
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* 标签：中文用Smiley Sans，纯英文/数字标签用科技字体 */
.label{
color:#ff7b00;
font-size:13px;
font-family: "Smiley Sans", sans-serif; /* 中文标签用Smiley Sans */
}

/* 值区域：ID/UUID/数字用科技字体，中文备注用Smiley Sans */
.value{
margin-bottom:8px;
word-break:break-all;
line-height: 1.5;
font-family:sans-serif;
}

/* 视频证据标签：中文用Smiley Sans */
.video-badge{
position:absolute;
top:12px;
right:12px;
background:linear-gradient(135deg,#ff3b30,#ff7a18);
color:#fff;
font-size:12px;
font-weight:600;
padding:4px 10px;
border-radius:20px;
display:flex;
align-items:center;
gap:4px;
cursor:pointer;
text-decoration:none;
transition:.2s;
/* 提升层级，避免被遮罩和滚动内容遮挡 */
z-index: 3;
font-family: "Smiley Sans", sans-serif; /* 视频徽章用Smiley Sans */
}

/* hover效果 */
.video-badge:hover{
background:#ff5c52;
transform:translateY(-1px);
box-shadow:0 4px 10px rgba(0,0,0,.25);
}

/* tooltip：中文用Smiley Sans */
.video-badge::after{
content:"点击查看视频证据";
position:absolute;
top:32px;
right:0;
background:#111;
color:#fff;
padding:6px 10px;
border-radius:6px;
font-size:12px;
white-space:nowrap;
opacity:0;
transform:translateY(-5px);
transition:.2s;
pointer-events:none;
z-index: 4;
font-family: "Smiley Sans", sans-serif; /* 提示文字用Smiley Sans */
}

.video-badge:hover::after{
opacity:1;
transform:translateY(0);
}

/* 分页：数字用科技字体，箭头保持风格 */
.pagination{
margin-top:40px;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.page{
min-width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
cursor:pointer;
transition:.25s;
font-size:14px;
font-family: 'Orbitron', "Smiley Sans", sans-serif; /* 页码数字用科技字体 */
}

.page:hover{
background:rgba(255,123,0,0.2);
border-color:#ff7b00;
transform:translateY(-2px);
}

.page.active{
background:linear-gradient(135deg,#ff7b00,#ffb347);
color:black;
font-weight:600;
box-shadow:0 4px 12px rgba(255,123,0,.4);
}

.page.arrow{
font-weight:bold;
font-size:16px;
}

/* ===== 备案号样式 ===== */
.beian{
margin-top:60px;
padding:30px 0 20px 0;
text-align:center;
font-size:12px;
letter-spacing:0.5px;
opacity:0.7;
font-family: "Smiley Sans", sans-serif; /* 备案号用Smiley Sans */
}

.beian a{
color:rgba(255,255,255,0.45);
text-decoration:none;
transition:0.25s;
font-family: "Smiley Sans", sans-serif;
}

.beian a:hover{
color:#ff7b00;
text-shadow:0 0 6px rgba(255,123,0,0.6);
}
</style>
</head>

<body>

<div class="user-panel">
当前用户：{{ session['account'] }}
<span style="color: {{ '#b22222' if is_super_admin else '#ff7b00'}}">
    {{ '（超级管理员）' if is_super_admin else '（管理员）'}}
</span>
<a href="/logout">退出登录</a>
<a href="/" style="color:#ff7b00">返回首页</a>
<a href="/search" style="color:#ff7b00">刷新列表</a>
</div>

<div class="search-bar">
<input id="searchInput" placeholder="UUID / ID / 备注搜索">
<select id="mainType">
<option value="">全部</option>
<option value="cheat">开挂</option>
<option value="爷新">爷新</option>
<option value="演员">演员</option>
<option value="特殊">特殊</option>
</select>
<select id="subType" style="display:none">
<option value="">全部</option>
<option value="新八开挂">新八</option>
<option value="老八开挂">老八</option>
</select>
</div>

<div id="grid" class="grid"></div>
<div id="pages" class="pagination"></div>

<script>
let data=[]
let filtered=[]
let page=1
const size=12

// 🔥 使用 index 预加载的缓存，0 卡顿
async function initSearchData() {
    // 有缓存 → 直接用
    if (window.searchPreload?.data.length) {
        data = window.searchPreload.data;
        filtered = [...data];
        render();
        return;
    }
    // 无缓存 → 正常请求
    try {
        const r = await fetch("/api/all_bans");
        const d = await r.json();
        data = d;
        filtered = [...d];
        render();
    } catch (e) {}
}

initSearchData();

/* 解析备注视频 */
function parseVideo(note){
if(!note) return {note:"",video:null}
const reg=/\\[视频证据\\]\\((.*?)\\)/
const match=note.match(reg)
if(match){
return{
note:note.replace(reg,"").trim(),
video:match[1]
}
}
return{
note:note,
video:null
}
}

/* 搜索匹配 */
function match(record,keyword){
keyword=keyword.toLowerCase()
return(
(record.Uuid && record.Uuid.toLowerCase().includes(keyword)) ||
(record.Name && record.Name.toLowerCase().includes(keyword)) ||
(record.Remark && record.Remark.toLowerCase().includes(keyword)) ||
(record.Type && record.Type.toLowerCase().includes(keyword))
)
}

/* 搜索 */
function search(){
const keyword=document.getElementById("searchInput").value
const main=document.getElementById("mainType").value
const sub=document.getElementById("subType").value
filtered=data.filter(r=>{
if(keyword && !match(r,keyword)) return false
if(main==="cheat"){
if(sub){
return r.Type===sub
}else{
return r.Type==="新八开挂" || r.Type==="老八开挂"
}
}
if(main && main!=="cheat"){
return r.Type===main
}
return true
})
page=1
render()
}

/* 二级分类控制 */
const mainType=document.getElementById("mainType")
const subType=document.getElementById("subType")
mainType.addEventListener("change",()=>{
if(mainType.value==="cheat"){
subType.style.display="inline-block"
}else{
subType.style.display="none"
subType.value=""
}
search()
})

document.getElementById("searchInput").oninput=search
document.getElementById("subType").onchange=search

/* 渲染 */
function render(){
const start=(page-1)*size
const list=filtered.slice(start,start+size)
const grid=document.getElementById("grid")
grid.innerHTML=""

list.forEach(r=>{
const parsed=parseVideo(r.Remark)
let videoLink = parsed.video || r.Video
let videoTag=""
if(videoLink){
videoTag=`
<a class="video-badge" href="${videoLink}" target="_blank">
🎬 视频
</a>
`
}

// 核心修改：将卡片内容包裹在card-content容器中
grid.innerHTML+=`
<div class="card">
${videoTag}
<div class="card-content">
<div class="label">ID</div>
<div class="value">${r.Name}</div>

<div class="label">UUID</div>
<div class="value">${r.Uuid}</div>

<div class="label">类型</div>
<div class="value">${r.Type}</div>

<div class="label">日期</div>
<div class="value">${r.Date}</div>

${parsed.note ? `
<div class="label">备注</div>
<div class="value">${parsed.note}</div>
` : ""}
</div>
</div>
`
})

// 渲染完成后初始化卡片交互
initCardInteractions()
renderPage()
}

/* 初始化卡片滚动交互 - 核心功能 */
function initCardInteractions() {
const cards = document.querySelectorAll('.card')
cards.forEach(card => {
const content = card.querySelector('.card-content')
let translateY = 0 // 记录当前偏移量
const maxScroll = Math.max(0, content.scrollHeight - content.clientHeight) // 最大可滚动距离

// 鼠标滚轮事件
card.addEventListener('wheel', (e) => {
e.preventDefault() // 阻止默认滚动
if(maxScroll === 0) return // 内容未超出，无需滚动

// 计算滚动偏移（控制滚动速度）
const delta = e.deltaY > 0 ? -15 : 15
let newY = translateY + delta

// 限制滚动范围（不超出上下边界）
newY = Math.min(0, Math.max(-maxScroll, newY))
translateY = newY

// 应用偏移（无动画，即时响应）
content.style.transform = `translateY(${translateY}px)`
}, { passive: false })

// 鼠标离开事件 - 复位
card.addEventListener('mouseleave', () => {
if(translateY !== 0) {
// 缓慢动画复位到初始位置
content.style.transform = 'translateY(0px)'
// 重置偏移量
setTimeout(() => {
translateY = 0
}, 500) // 与CSS动画时长一致
}
})
})
}

function renderPage(){
const total=Math.ceil(filtered.length/size)
const box=document.getElementById("pages")
box.innerHTML=""
if(total<=1) return

const maxShow=5
let start=Math.max(1,page-Math.floor(maxShow/2))
let end=start+maxShow-1
if(end>total){
end=total
start=Math.max(1,end-maxShow+1)
}

/* 上一页 */
if(page>1){
box.innerHTML+=`
<div class="page arrow" onclick="go(${page-1})">‹</div>
`
}

/* 页码 */
for(let i=start;i<=end;i++){
box.innerHTML+=`
<div class="page ${i===page?'active':''}" onclick="go(${i})">${i}</div>
`
}

/* 下一页 */
if(page<total){
box.innerHTML+=`
<div class="page arrow" onclick="go(${page+1})">›</div>
`
}
}

function go(i){
page=i
render()
}
</script>

<div class="beian">
<a href="https://beian.miit.gov.cn/" target="_blank">
备案号：沪ICP备2024085005号-1
</a>
</div>

{% if session.logged_in and (is_admin or is_super_admin) %}
<div style="display:none; width:0; height:0; opacity:0; pointer-events:none;">
    <!-- 仅管理员提前渲染首页 -->
    <iframe src="/" title="预加载首页"></iframe>
</div>
{% endif %}

</body>
</html>
